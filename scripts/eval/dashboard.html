<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Eval AI Agent — 24 Tasks</title>
  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --agent: #a78bfa; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main { padding: 1.5rem 2rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .card { background: var(--panel); padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    .card .num { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden; font-size: 0.875rem; }
    th, td { padding: 0.55rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { background: #334155; position: sticky; top: 0; }
    .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.75rem; color: #fff; }
    .ok { background: #22c55e; } .partial { background: #eab308; color: #000; }
    .mismatch { background: #ef4444; } .none { background: #64748b; }
    .completed { background: #3b82f6; } .incomplete { background: #ef4444; }
    code { font-size: 0.8em; word-break: break-all; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    button { background: var(--accent); color: #0f172a; border: none; padding: 0.45rem 0.9rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    #err, #msg { margin-bottom: 1rem; }
    #err { color: #f87171; }
    #msg { color: #86efac; }
    .help-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .help-box h2 { margin: 0 0 0.5rem; font-size: 1rem; }
    .help-box pre { background: #0f172a; padding: 0.75rem; border-radius: 6px; overflow-x: auto; font-size: 0.8rem; white-space: pre-wrap; margin: 0; }
    .remote-cell { font-size: 0.78rem; color: var(--muted); max-width: 200px; word-break: break-all; line-height: 1.35; }
    .score-cell { font-weight: 700; font-size: 0.9rem; }
    .score-high { color: #22c55e; } .score-mid { color: #eab308; } .score-low { color: #f87171; }
    a.guide { color: var(--agent); font-weight: 600; text-decoration: none; }
    a.guide:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Eval AI Agent — 24 Tasks</h1>
    <p class="sub">Each row is one agent task (B1–D6) · Use Cursor + guide + AGENT_PROMPTS.md</p>
  </header>
  <main>
    <div id="err"></div>
    <div id="msg"></div>

    <div class="toolbar">
      <button onclick="refresh(false)">Refresh</button>
      <button class="secondary" onclick="location.href='/api/docs'">API docs</button>
      <span class="sub" id="updated"></span>
    </div>
    <div class="cards" id="cards"></div>
    <table>
      <thead>
        <tr>
          <th>Task</th><th>Name</th><th>Track</th><th>Repo</th>
          <th>Agent work</th><th>Remote API</th><th title="Repo files + tests + agent submit — not API">Score</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="help-box">
      <h2>Agent workflow</h2>
      <pre id="agent-help">Loading…</pre>
    </div>
  </main>
  <script>
    function badge(cls, text) {
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function statusBadge(v) {
      if (!v) return badge('none', '—');
      if (v === 'ok') return badge('ok', v);
      if (v === 'partial' || v === 'reference_only') return badge('partial', v);
      return badge('mismatch', v);
    }

    async function refresh(runTests = false) {
      document.getElementById('err').textContent = '';
      try {
        const r = await fetch(`/api/portfolio${runTests ? '?run_tests=1' : ''}`);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || r.statusText);
        render(data);
      } catch (e) {
        document.getElementById('err').textContent = 'Cannot load: ' + e.message + ' — run: make eval-api';
      }
    }

    function scoreClass(n) {
      if (n >= 80) return 'score-high';
      if (n >= 50) return 'score-mid';
      return 'score-low';
    }

    function formatRemote(remote) {
      if (!remote || !remote.registered) return badge('none', 'not set');
      const label = remote.api_id || 'default';
      const url = remote.api_base_url || '';
      return `<span class="remote-cell" title="${url}">${label}<br><code>${url.replace(/^https?:\/\//, '')}</code></span>`;
    }

    function taskScore(t, ar) {
      if (t.completion_score != null) return t.completion_score;
      if (ar && ar.completion_score != null) return ar.completion_score;
      if (t.deliverables_ok && t.verified) return 85;
      if (t.deliverables_ok) return 65;
      return 0;
    }

    function render(data) {
      const s = data.summary;
      document.getElementById('updated').textContent = 'Updated: ' + (data.generated_at || '');
      document.getElementById('cards').innerHTML = `
        <div class="card"><div class="num">${s.total}</div><div class="lbl">Tasks</div></div>
        <div class="card"><div class="num">${s.complete_count ?? 0}</div><div class="lbl">Complete (≥80)</div></div>
        <div class="card"><div class="num">${s.agent_ok || 0}</div><div class="lbl">Agent OK</div></div>
        <div class="card"><div class="num">${s.agent_evaluated || 0}</div><div class="lbl">Submitted</div></div>
        <div class="card"><div class="num">${s.verified ?? 0}</div><div class="lbl">Tests verified</div></div>
        <div class="card"><div class="num">${s.completion_pct}%</div><div class="lbl">Repo ready</div></div>
      `;
      document.getElementById('rows').innerHTML = data.tasks.map(t => {
        const repo = t.deliverables_ok ? badge('completed', 'ready') : badge('incomplete', 'missing');
        const ar = t.agent_result || {};
        const agentV = ar.md_verdict || ar.verdict;
        const score = taskScore(t, ar);
        return `<tr>
          <td><strong>${t.id}</strong></td>
          <td>${t.name}</td>
          <td>${t.category}</td>
          <td>${repo}</td>
          <td>${statusBadge(agentV)}</td>
          <td>${formatRemote(t.remote_api)}</td>
          <td class="score-cell ${scoreClass(score)}">${score}%</td>
          <td><a class="guide" href="/api/agent/guide/${t.id}" target="_blank">guide</a></td>
        </tr>`;
      }).join('');
    }

    async function loadHelp() {
      const r = await fetch('/api/docs');
      const d = await r.json();
      document.getElementById('agent-help').textContent = [
        '1. Click guide (or GET /api/agent/guide/B1)',
        '2. Copy prompt from docs/AGENT_PROMPTS.md',
        '3. Do the work in Cursor',
        '4. POST /api/agent/submit  {task_id, agent_name, output_path}',
        '',
        'Score % = repo ready + tests + agent output (NOT live API probe).',
        'Remote API column = optional link only (POST /api/external/register).',
        '',
        ...(d.workflow || [])
      ].join('\n');
    }

    refresh(false);
    loadHelp();
    setInterval(() => refresh(false), 15000);
  </script>
</body>
</html>
