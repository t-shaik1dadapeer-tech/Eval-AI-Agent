apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: b4-transaction-api
  namespace: eval-ai-agent
  labels:
    app: b4-transaction-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: b4-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
