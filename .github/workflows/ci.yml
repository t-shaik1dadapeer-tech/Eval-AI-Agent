name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - beginner/B4-fastapi-service
          - intermediate/I4-polyglot-service-pair/fastapi-service
          - advanced/A3-polyglot-system/fastapi-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: ${{ matrix.service }}
        run: pytest -v

  node-tests:
    name: Node (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: beginner/B5-nodejs-api
            needs_rust: false
          - service: intermediate/I4-polyglot-service-pair/node-client
            needs_rust: false
          - service: advanced/A3-polyglot-system/node-worker
            needs_rust: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        if: matrix.needs_rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build A3 Rust engine
        if: matrix.needs_rust
        working-directory: advanced/A3-polyglot-system/rust-engine
        run: cargo build --release

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          FRAUD_SYSTEM_ROOT: ${{ github.workspace }}/advanced/A3-polyglot-system
          RUST_ENGINE_BIN: ${{ github.workspace }}/advanced/A3-polyglot-system/rust-engine/target/release/fraud-engine
        run: npm test

  rust-tests:
    name: Rust (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - beginner/B6-rust-log-analyzer
          - advanced/A3-polyglot-system/rust-engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo test
        working-directory: ${{ matrix.service }}
        run: cargo test --verbose
