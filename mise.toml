# Pinned tool versions for reproducible development (aligned with .github/workflows/ci.yml).
# Install mise: https://mise.jdx.dev — or run `make bootstrap` (installs mise automatically).

[tools]
python = "3.11.11"
node = "20.18.1"
rust = "1.84.1"
terraform = "1.9.8"

[env]
# Required for A3 Node worker integration tests (see scripts/ci-verify.sh)
FRAUD_SYSTEM_ROOT = "{{config_root}}/advanced/A3-polyglot-system"
RUST_ENGINE_BIN = "{{config_root}}/advanced/A3-polyglot-system/rust-engine/target/release/fraud-engine"
